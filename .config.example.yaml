# Example configuration for gh-observer
# Copy to ~/.config/gh-observer/config.yaml to customize

# Refresh interval for polling GitHub API
refresh_interval: 5s

# Refresh interval for repo mode (--repo flag)
repo_refresh_interval: 15s

# How long completed checks remain visible before fading out
fade_success: 15m  # Successful checks disappear after 15 minutes
fade_failure: 30m  # Failed checks disappear after 30 minutes

# Show non-PR workflow runs (post-merge, scheduled, workflow_dispatch) in --repo mode
repo_show_branch_runs: true

# Color codes for terminal output (ANSI 256-color palette)
colors:
  success: 10  # Green - completed successfully
  failure: 9   # Red - completed with failure
  running: 11  # Yellow - currently in progress
  queued: 8    # Gray - waiting to start
