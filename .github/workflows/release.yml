name: Release

on:
  push:
    tags:
      - 'v*'

# empty global permissions
permissions: {}

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
      attestations: write
    outputs:
      hashes: ${{ steps.hash.outputs.hashes }}
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2.20.0
        with:
          egress-policy: audit

      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false

      - name: Build cross-platform binaries
        uses: cli/gh-extension-precompile@76961aa3bd1123d0a6fd42d0a41aca0696937c39 # v2.2.0
        with:
          go_version_file: go.mod
          generate_attestations: true

      - name: Generate subject hashes for SLSA provenance
        id: hash
        run: |
          cd dist
          hashes=$(sha256sum darwin-* linux-* freebsd-* windows-* | base64 -w0)
          echo "hashes=$hashes" >> "$GITHUB_OUTPUT"

      - name: Install cosign
        uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2

      - name: Sign binaries with cosign (keyless)
        run: |
          cd dist
          for binary in darwin-* linux-* freebsd-* windows-*; do
            [[ -f "$binary" ]] || continue
            cosign sign-blob --yes "$binary" \
              --output-signature "${binary}.sig" \
              --output-certificate "${binary}.pem" \
              --bundle "${binary}.bundle"
          done

      - name: Upload cosign signatures and certificates
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          cd dist
          for sig in *.sig; do
            [[ -f "$sig" ]] || continue
            gh release upload "$TAG" "$sig" --clobber
          done
          for pem in *.pem; do
            [[ -f "$pem" ]] || continue
            gh release upload "$TAG" "$pem" --clobber
          done
          for bundle in *.bundle; do
            [[ -f "$bundle" ]] || continue
            gh release upload "$TAG" "$bundle" --clobber
          done

  provenance:
    needs: release
    permissions:
      actions: read
      id-token: write
      contents: write
    # SLSA generator requires a tag ref (refs/tags/vX.Y.Z) for its internal builder checkout;
    # pinning to a git SHA causes "Invalid ref" errors and provenance generation failure.
    # See: https://github.com/fini-net/gh-observer/actions/runs/27281001944
    uses: slsa-framework/slsa-github-generator/.github/workflows/generator_generic_slsa3.yml@v2.1.0 # zizmor: ignore[unpinned-uses]
    with:
      base64-subjects: "${{ needs.release.outputs.hashes }}"
      upload-assets: true
