name: Release

on:
  push:
    tags:
      - 'v*'

# empty global permissions
permissions: {}

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
      attestations: write
    outputs:
      hashes: ${{ steps.hash.outputs.hashes }}
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          persist-credentials: false

      - name: Build cross-platform binaries
        uses: cli/gh-extension-precompile@9e2237c30f869ad3bcaed6a4be2cd43564dd421b # v2.1.0
        with:
          go_version_file: go.mod
          generate_attestations: true

      - name: Generate subject hashes for SLSA provenance
        id: hash
        run: |
          cd dist
          hashes=$(sha256sum darwin-* linux-* freebsd-* windows-* | base64 -w0)
          echo "hashes=$hashes" >> "$GITHUB_OUTPUT"

      - name: Install cosign
        uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2

      - name: Sign binaries with cosign (keyless)
        run: |
          cd dist
          for binary in darwin-* linux-* freebsd-* windows-*; do
            [[ -f "$binary" ]] || continue
            cosign sign-blob --yes "$binary" \
              --output-signature "${binary}.sig" \
              --output-certificate "${binary}.pem" \
              --bundle "${binary}.bundle"
          done

      - name: Upload cosign signatures and certificates
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          cd dist
          for sig in *.sig; do
            [[ -f "$sig" ]] || continue
            gh release upload "$TAG" "$sig" --clobber
          done
          for pem in *.pem; do
            [[ -f "$pem" ]] || continue
            gh release upload "$TAG" "$pem" --clobber
          done
          for bundle in *.bundle; do
            [[ -f "$bundle" ]] || continue
            gh release upload "$TAG" "$bundle" --clobber
          done

  provenance:
    needs: release
    permissions:
      actions: read
      id-token: write
      contents: write
    uses: slsa-framework/slsa-github-generator/.github/workflows/generator_generic_slsa3.yml@v2.1.0
    with:
      base64-subjects: "${{ needs.release.outputs.hashes }}"
      upload-assets: true
