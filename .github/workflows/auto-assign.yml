name: Auto Assign

on:
  issues:
    types: [opened]
  pull_request:
    types: [opened]

# global permissions
permissions: {}

jobs:
  run:
    runs-on: ubuntu-latest
    permissions:
      issues: write
      pull-requests: write
      contents: read
    steps:
    - name: Harden the runner (Audit all outbound calls)
      uses: step-security/harden-runner@9ca718d3bf646d6534007c269a635b3e54cadf99 # v2.19.2
      with:
        egress-policy: audit

    - name: 'Auto-assign issue'
      uses: pozil/auto-assign-issue@70adb98ca8b3941524e9ecde48e89067c4f96736 # v3.0.0
      with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}
          assignees: chicks-net
          numOfAssignee: 1
          allowSelfAssign: true
