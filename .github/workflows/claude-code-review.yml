name: Claude Code Review

on:
  pull_request:
    types: [opened, synchronize, ready_for_review, reopened]
    # Optional: Only run on specific file changes
    # paths:
    #   - "src/**/*.ts"
    #   - "src/**/*.tsx"
    #   - "src/**/*.js"
    #   - "src/**/*.jsx"

# global permissions
permissions: {}

jobs:
  claude-review:
    # Optional: Filter by PR author
    # if: |
    #   github.event.pull_request.user.login == 'external-contributor' ||
    #   github.event.pull_request.user.login == 'new-developer' ||
    #   github.event.pull_request.author_association == 'FIRST_TIME_CONTRIBUTOR'

    runs-on: ubuntu-latest
    environment: claude
    permissions:
      contents: read
      pull-requests: write
      issues: read
      id-token: write

    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@8d3c67de8e2fe68ef647c8db1e6a09f647780f40 # v2.19.0
        with:
          egress-policy: audit

      - name: Validate PR inputs
        id: validate
        run: |
          # Validate github.repository matches expected pattern (owner/repo)
          if ! echo "${{ github.repository }}" | grep -qE '^[a-zA-Z0-9_-]+/[a-zA-Z0-9_.-]+$'; then
            echo "::error::Invalid repository format: ${{ github.repository }}"
            exit 1
          fi
          # Validate PR number is a positive integer
          pr_num="${{ github.event.pull_request.number }}"
          if ! echo "$pr_num" | grep -qE '^[1-9][0-9]*$'; then
            echo "::error::Invalid PR number: $pr_num"
            exit 1
          fi
          echo "repository=${{ github.repository }}" >> "$GITHUB_OUTPUT"
          echo "pr_number=$pr_num" >> "$GITHUB_OUTPUT"

      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false
          fetch-depth: 1

      - name: Run Claude Code Review
        id: claude-review
        uses: anthropics/claude-code-action@e58dfa55559035499a4982426bb73605e8b5ad8e # v1.0.105
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          plugin_marketplaces: 'https://github.com/anthropics/claude-code.git'
          plugins: 'code-review@claude-code-plugins'
          prompt: '/code-review:code-review ${{ steps.validate.outputs.repository }}/pull/${{ steps.validate.outputs.pr_number }}'
          use_sticky_comment: true
          # allowed_tools is not a valid input for this action; tool access is controlled via claude_args
          # See https://github.com/anthropics/claude-code-action/blob/main/docs/usage.md
          # or https://code.claude.com/docs/en/cli-reference for available options

