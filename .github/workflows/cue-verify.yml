---
name: CUE Validation
on:
  push:
    branches:
      - main
  pull_request:

# global permissions
permissions: {}

jobs:
  verify:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6 # zizmor: ignore[unpinned-uses]
        with:
          persist-credentials: false

      - name: Install just
        uses: extractions/setup-just@v3 # zizmor: ignore[unpinned-uses]

      - name: Install CUE
        uses: cue-lang/setup-cue@v1.0.1 # zizmor: ignore[unpinned-uses]

      - name: Verify CUE schemas
        run: just cue-verify
