name: VEX Generation
on:
  schedule:
    - cron: '30 10 * * 1' # Weekly on Monday at 10:30 UTC
  workflow_dispatch:
  release:
    types: [published]
permissions:
  contents: read
jobs:
  generate-vex:
    runs-on: ubuntu-latest
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2.20.0
        with:
          egress-policy: audit

      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
        with:
          persist-credentials: false
      - uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7
        with:
          go-version-file: go.mod
          cache: false

      - name: Install vexctl
        run: go install github.com/openvex/vexctl@latest

      - name: Generate VEX document
        run: |
          chmod +x vex/generate-vex.sh
          ./vex/generate-vex.sh -o vex/openvex.json

      - name: Upload VEX document
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: openvex-document
          path: vex/openvex.json
          retention-days: 90